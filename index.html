<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ShopX Pro</title>

<style>
body{margin:0;font-family:tahoma;background:#0f172a;color:white}
header{padding:15px;background:#111827;display:flex;justify-content:space-between}

.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;padding:20px}

.card{background:#1f2937;padding:15px;border-radius:15px}
button{padding:10px;border:none;border-radius:10px;cursor:pointer}
.add{background:linear-gradient(45deg,#7c3aed,#06b6d4);color:white;width:100%}

.cart{
position:fixed;left:10px;top:70px;
background:#111827;
padding:15px;
width:260px;
border-radius:15px;
}

.pay{background:green;color:white;width:100%;margin-top:10px}
</style>
</head>

<body>

<header>
<h2>ShopX Pro</h2>
<div>🛒 <span id="count">0</span></div>
</header>

<div class="cart">
<h3>سبد خرید</h3>
<div id="list"></div>
<h4>جمع: <span id="total">0</span></h4>
<button class="pay" onclick="pay()">پرداخت زرین‌پال</button>
</div>

<div class="container">

<div class="card">
<h3>گوشی</h3>
<p>10,000,000</p>
<button class="add" onclick="add('گوشی',10000000)">افزودن</button>
</div>

<div class="card">
<h3>لپ‌تاپ</h3>
<p>25,000,000</p>
<button class="add" onclick="add('لپ تاپ',25000000)">افزودن</button>
</div>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

function add(n,p){
cart.push({name:n,price:p});
save();
render();
}

function render(){

let list = document.getElementById("list");
list.innerHTML="";

let total = 0;

cart.forEach((i)=>{
total += i.price;
list.innerHTML += `<div>${i.name}</div>`;
});

document.getElementById("total").innerText = total;
document.getElementById("count").innerText = cart.length;
}

function pay(){

let total = cart.reduce((s,i)=>s+i.price,0);

fetch("request.php",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({amount:total})
})
.then(r=>r.json())
.then(d=>{
if(d.url) window.location.href = d.url;
});

}

render();

</script>

</body>
</html>
